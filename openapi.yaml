openapi: 3.1.0
info:
  title: WHISP Phase 1 API
  version: 1.0.0
servers:
  - url: https://api.whisp.local
security:
  - bearerAuth: []
paths:
  /auth/login:
    post:
      tags: [auth]
      summary: Issue access and refresh tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [wid, device_id]
              properties:
                wid:
                  type: string
                device_id:
                  type: string
      responses:
        '200':
          description: Auth tokens
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokens'
  /auth/refresh:
    post:
      tags: [auth]
      summary: Rotate refresh token
      operationId: authRefresh
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [wid, device_id, refresh_token_value]
              properties:
                wid:
                  type: string
                device_id:
                  type: string
                refresh_token_value:
                  type: string
      responses:
        '200':
          description: Rotated tokens
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokens'
  /auth/logout:
    post:
      tags: [auth]
      summary: Revoke session chain
      operationId: authLogout
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [wid]
              properties:
                wid:
                  type: string
      responses:
        '204':
          description: Logged out

  /identity/register:
    post:
      tags: [identity]
      summary: Register core identity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [wid, public_key]
              properties:
                wid:
                  type: string
                public_key:
                  type: string
      responses:
        '201':
          description: Identity registered
  /identity/devices:
    post:
      tags: [identity]
      summary: Register a device
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceRegistration'
      responses:
        '201':
          description: Device registered
  /identity/devices/{device_id}:
    delete:
      tags: [identity]
      summary: Revoke a device and invalidate its token families
      parameters:
        - in: path
          name: device_id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [wid]
              properties:
                wid:
                  type: string
      responses:
        '204':
          description: Device revoked
  /identity/key-bundles/{wid}:
    get:
      tags: [identity]
      summary: Get public key bundle
      parameters:
        - in: path
          name: wid
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Public keys
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicKeyBundle'
  /identity/blocks/{target_wid}:
    post:
      tags: [identity]
      summary: Add global block
      parameters:
        - in: path
          name: target_wid
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [wid]
              properties:
                wid:
                  type: string
      responses:
        '204':
          description: Blocked
    delete:
      tags: [identity]
      summary: Remove global block
      parameters:
        - in: path
          name: target_wid
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [wid]
              properties:
                wid:
                  type: string
      responses:
        '204':
          description: Unblocked
  /identity/prekey-bundle:
    post:
      tags: [identity]
      summary: Upload per-device prekey bundle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PrekeyBundleUpload'
      responses:
        '201':
          description: Bundle stored
        '400':
          description: Invalid bundle payload
        '409':
          description: Duplicate bundle or immutable key violation
  /identity/prekey-bundle/{wid}/{device_id}:
    get:
      tags: [identity]
      summary: Fetch prekey bundle and atomically consume one-time prekey
      parameters:
        - in: path
          name: wid
          required: true
          schema:
            type: string
        - in: path
          name: device_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Bundle with consumed one-time prekey
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrekeyBundleFetch'
        '400':
          description: Bundle not found or invalid request
        '409':
          description: No unused one-time prekeys available

  /spaces:
    post:
      tags: [spaces]
      summary: Create space
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type, public_flag]
              properties:
                type:
                  type: string
                  enum: [private, school, public]
                public_flag:
                  type: boolean
      responses:
        '201':
          description: Created
  /spaces/{space_id}/join:
    post:
      tags: [spaces]
      summary: Join space
      parameters:
        - in: path
          name: space_id
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Joined
  /spaces/{space_id}/leave:
    post:
      tags: [spaces]
      summary: Leave space
      parameters:
        - in: path
          name: space_id
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Left
  /spaces/{space_id}/roles:
    post:
      tags: [spaces]
      summary: Assign role in space
      parameters:
        - in: path
          name: space_id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [wid, role]
              properties:
                wid:
                  type: string
                role:
                  type: string
                  enum: [member, moderator, admin]
      responses:
        '204':
          description: Role assigned
  /spaces/requests:
    post:
      tags: [spaces]
      summary: Create contact request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [to_wid]
              properties:
                to_wid:
                  type: string
      responses:
        '201':
          description: Request created
  /spaces/requests/{request_id}/accept:
    post:
      tags: [spaces]
      summary: Accept contact request and create private space
      parameters:
        - in: path
          name: request_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Accepted
          content:
            application/json:
              schema:
                type: object
                required: [space_id]
                properties:
                  space_id:
                    type: string
  /spaces/requests/{request_id}/reject:
    post:
      tags: [spaces]
      summary: Reject contact request
      parameters:
        - in: path
          name: request_id
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Rejected

  /permissions/dm-eligibility:
    post:
      tags: [permissions]
      summary: Check DM eligibility
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [from_wid, to_wid]
              properties:
                from_wid:
                  type: string
                to_wid:
                  type: string
      responses:
        '200':
          description: Decision
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PermissionDecision'
  /permissions/space-action:
    post:
      tags: [permissions]
      summary: Check role-based space action
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [wid, space_id, action]
              properties:
                wid:
                  type: string
                space_id:
                  type: string
                action:
                  type: string
      responses:
        '200':
          description: Decision
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PermissionDecision'

  /relay/messages:
    post:
      tags: [relay]
      summary: Store encrypted message payload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RelayMessageIn'
      responses:
        '202':
          description: Accepted
    get:
      tags: [relay]
      summary: Pull encrypted messages by space
      parameters:
        - in: query
          name: space_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RelayMessageOut'
  /relay/echo:
    post:
      tags: [relay]
      summary: Store ciphertext echo payload for self-roundtrip validation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RelayEchoIn'
      responses:
        '201':
          description: Echo stored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RelayEchoOut'
        '400':
          description: Invalid payload
        '409':
          description: Duplicate message_id for wid/device_id
        '413':
          description: Ciphertext exceeds 65536 bytes
  /relay/echo/{message_id}:
    get:
      tags: [relay]
      summary: Read previously stored echo payload
      parameters:
        - in: path
          name: message_id
          required: true
          schema:
            type: string
        - in: query
          name: wid
          required: true
          schema:
            type: string
        - in: query
          name: device_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Echo payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RelayEchoOut'
        '400':
          description: Not found or invalid query

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    AuthTokens:
      type: object
      required: [access_token, refresh_token_value]
      properties:
        access_token:
          type: string
        refresh_token_value:
          type: string
    DeviceRegistration:
      type: object
      required: [wid, device_id, device_public_key]
      properties:
        wid:
          type: string
        device_id:
          type: string
        device_public_key:
          type: string
    PublicKeyBundle:
      type: object
      required: [wid, public_key, devices]
      properties:
        wid:
          type: string
        public_key:
          type: string
        devices:
          type: array
          items:
            type: object
            required: [device_id, device_public_key]
            properties:
              device_id:
                type: string
              device_public_key:
                type: string
    PermissionDecision:
      type: object
      required: [allowed, deny_reason]
      properties:
        allowed:
          type: boolean
        deny_reason:
          type: string
          enum: [none, blocked, no_consent, role_denied, not_member]
    RelayMessageIn:
      type: object
      required: [space_id, sender_wid, to_wid, ciphertext_blob]
      properties:
        space_id:
          type: string
        sender_wid:
          type: string
        to_wid:
          type: string
        ciphertext_blob:
          type: string
        client_message_id:
          type: string
    RelayMessageOut:
      type: object
      required: [message_id, space_id, sender_wid, ciphertext_blob, created_at]
      properties:
        message_id:
          type: string
        space_id:
          type: string
        sender_wid:
          type: string
        ciphertext_blob:
          type: string
        created_at:
          type: string
          format: date-time
    RelayEchoIn:
      type: object
      required: [wid, device_id, message_id, ciphertext]
      properties:
        wid:
          type: string
        device_id:
          type: string
        message_id:
          type: string
        ciphertext:
          type: string
          description: Base64-encoded ciphertext envelope bytes
    RelayEchoOut:
      type: object
      required: [wid, device_id, message_id, ciphertext, created_at]
      properties:
        wid:
          type: string
        device_id:
          type: string
        message_id:
          type: string
        ciphertext:
          type: string
          description: Base64-encoded ciphertext envelope bytes
        created_at:
          type: string
          format: date-time
    SignedPrekey:
      type: object
      required: [signed_prekey_id, signed_prekey_public, signature]
      properties:
        signed_prekey_id:
          type: integer
          minimum: 1
        signed_prekey_public:
          type: string
        signature:
          type: string
    OneTimePrekey:
      type: object
      required: [prekey_id, public_key]
      properties:
        prekey_id:
          type: integer
          minimum: 1
        public_key:
          type: string
    PrekeyBundleUpload:
      type: object
      required: [wid, device_id, identity_key, signed_prekey, one_time_prekeys]
      properties:
        wid:
          type: string
        device_id:
          type: string
        identity_key:
          type: string
        signed_prekey:
          $ref: '#/components/schemas/SignedPrekey'
        one_time_prekeys:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/OneTimePrekey'
    PrekeyBundleFetch:
      type: object
      required: [wid, device_id, identity_key, signed_prekey, one_time_prekey]
      properties:
        wid:
          type: string
        device_id:
          type: string
        identity_key:
          type: string
        signed_prekey:
          $ref: '#/components/schemas/SignedPrekey'
        one_time_prekey:
          $ref: '#/components/schemas/OneTimePrekey'
