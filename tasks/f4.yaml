ci_gate_tasks:
  - id: F4-CI-1
    title: Keep relay/orchestrator coverage gate enforced at >=90 line and branch
    owner: devops
    status: completed
    estimate: 0.25d
    dependencies: []
    deliverables:
      - ci_config
    definition_of_done:
      - coverage_threshold_active
      - current_relay_coverage_green
    gate_checks:
      - relay_coverage_hard_gate
    evidence_required:
      - ci_run_url
      - test_report
  - id: F4-CI-2
    title: Add fanout queue integrity regression to CI
    owner: devops
    status: planned
    estimate: 0.25d
    dependencies: [F4-T11, F4-SR-3]
    deliverables:
