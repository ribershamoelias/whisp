version: 1
project: WHISP
roadmap: phase1
defaults:
  estimate_unit: d
  task_status: planned
  dependency_rule: "All dependencies must be done before task can start"

owners:
  backend:
    role: "Backend Engineer"
  flutter:
    role: "Flutter Engineer"
  devops:
    role: "DevOps/SRE Engineer"
  security:
    role: "Security Engineer"
  qa:
    role: "QA Engineer"
  techlead:
    role: "Tech Lead / Architect"

global_constraints:
  - id: GC-001
    rule: "No plaintext message content may be logged, persisted, or emitted in telemetry"
  - id: GC-002
    rule: "No direct message creation without accepted request or existing private space"
  - id: GC-003
    rule: "Global block is enforced at Core WID level in all services"
  - id: GC-004
    rule: "No custom cryptography implementation; only vetted Signal-compatible libraries"
  - id: GC-005
    rule: "All API changes require OpenAPI update and contract validation"
  - id: GC-006
    rule: "Phase gate must pass before work starts on next phase"
  - id: GC-007
    rule: "Critical flow tests must stay green on main branch"

gate_catalog:
  - id: no_plaintext_logging
    description: "Static checks and runtime tests prove no plaintext message logging"
  - id: block_logic_not_affected
    description: "Global block invariants remain unchanged"
  - id: consent_policy_enforced
    description: "Permission engine denies unauthorized DM or role action"
  - id: openapi_validated
    description: "OpenAPI spec is syntactically valid and contract-tested"
  - id: migration_safe
    description: "DB migration rollback and forward run successfully"
  - id: crypto_boundary_preserved
    description: "Server handles ciphertext only; client performs decrypt"
  - id: replay_protection_enabled
    description: "Token/message replay attempts are detected and rejected"
  - id: observability_minimum_met
    description: "Tracing, metrics, and logs emitted for critical flows"
  - id: perf_budget_met
    description: "Latency/error budgets met under defined load profile"

evidence_standards:
  required_artifacts:
    - "CI run URL"
    - "Test report artifact"
    - "Coverage delta"
    - "OpenAPI diff (if API task)"
    - "Migration report (if DB task)"
    - "Security checklist (if auth/crypto/policy task)"

phases:
  - id: F0
    name: Foundation
    objective: "Architecture freeze, repo baseline, CI and security baseline"
    phase_gate:
      required_checks:
        - architecture_freeze_signed
        - ci_pipeline_green
        - security_baseline_enabled
      stop_conditions:
        - "Architecture decisions unresolved"
        - "CI unstable for >2 days"
    epics:
      - id: F0-E1
        name: Architecture Freeze
        owner: techlead
        tasks:
          - id: F0-T1
            title: "Create ADR-001 runtime architecture (modular monolith)"
            owner: techlead
            estimate: 0.5d
            dependencies: []
            deliverables:
              - docs
              - architecture_diagram
            definition_of_done:
              - adr_committed
              - peer_review_done
              - lint_clean
            gate_checks:
              - consent_policy_enforced
            evidence_required:
              - adr_link
              - review_approval
          - id: F0-T2
            title: "Create ADR-002 auth/token strategy (JWT + refresh rotation)"
            owner: techlead
            estimate: 0.5d
            dependencies: [F0-T1]
            deliverables:
              - docs
              - sequence_diagram
            definition_of_done:
              - adr_committed
              - threat_assumptions_listed
            gate_checks:
              - replay_protection_enabled
            evidence_required:
              - adr_link
              - threat_notes
          - id: F0-T3
            title: "Create ADR-003 Signal integration boundary"
            owner: techlead
            estimate: 0.5d
            dependencies: [F0-T1]
            deliverables:
              - docs
              - boundary_contract
            definition_of_done:
              - adr_committed
              - server_crypto_boundary_defined
            gate_checks:
              - crypto_boundary_preserved
            evidence_required:
              - adr_link
              - boundary_table
      - id: F0-E2
        name: Repo and CI Baseline
        owner: devops
        tasks:
          - id: F0-T4
            title: "Initialize monorepo layout for api, flutter, docs, tasks"
            owner: devops
            estimate: 0.5d
            dependencies: []
            deliverables:
              - code
              - docs
            definition_of_done:
              - directory_structure_created
              - bootstrap_commands_documented
            gate_checks:
              - observability_minimum_met
            evidence_required:
              - tree_snapshot
          - id: F0-T5
            title: "Add CI pipeline for lint, unit test, integration test stages"
            owner: devops
            estimate: 1d
            dependencies: [F0-T4]
            deliverables:
              - code
              - ci_config
            definition_of_done:
              - ci_stages_defined
              - required_checks_protected
              - lint_clean
            gate_checks:
              - observability_minimum_met
            evidence_required:
              - ci_run_url
              - branch_protection_screenshot
          - id: F0-T6
            title: "Enable SAST, secret scanning, dependency audit in CI"
            owner: security
            estimate: 0.5d
            dependencies: [F0-T5]
            deliverables:
              - ci_config
              - security_config
            definition_of_done:
              - sast_enabled
              - secret_scan_enabled
              - dependency_audit_enabled
            gate_checks:
              - no_plaintext_logging
            evidence_required:
              - ci_run_url
              - security_report
      - id: F0-E3
